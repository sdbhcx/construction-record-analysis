version: '3.8'

services:
  # 1. vLLM 推理引擎 (Qwen2-VL 挂载与加速)
  vllm:
    image: vllm/vllm-openai:latest
    container_name: pdf_vllm_engine
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      # 映射宿主机的模型目录到容器内
      - "/data/models:/models"
    command: >
      --model /models/Qwen/Qwen2-VL-7B-Instruct-AWQ 
      --quantization awq
      --gpu-memory-utilization 0.9 
      --max-model-len 4096 
      --enforce-eager
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # 2. 关系型数据库 (持久化业务数据)
  postgres:
    image: postgres:15-alpine
    container_name: pdf_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pdf_system
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 3. 消息队列 / 缓存 (Celery Broker)
  redis:
    image: redis:7-alpine
    container_name: pdf_redis
    ports:
      - "6379:6379"

  # 4. 向量数据库 (用于 Schema 柔性对齐与实体消歧)
  qdrant:
    image: qdrant/qdrant
    container_name: pdf_qdrant_vector_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # 5. 对象存储 (PDF 原始文件与切片)
  minio:
    image: minio/minio
    container_name: pdf_minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # 6. 后端 API 接口 (FastAPI)
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdf_backend_api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/pdf_system
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - VLLM_API_URL=http://vllm:8000/v1
      - QDRANT_HOST=qdrant
    depends_on:
      - postgres
      - redis
      - minio
      - vllm

  # 7. Celery 工作流节点 (执行万级批处理与 LLM-as-a-judge)
  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdf_celery_worker
    command: celery -A worker.app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/pdf_system
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - VLLM_API_URL=http://vllm:8000/v1
      - ALARM_WEBHOOK_URL=${WEBHOOK_URL:-https://oapi.dingtalk.com/robot/send?access_token=your_token}
    depends_on:
      - api
      - redis
      - vllm

volumes:
  pg_data:
  qdrant_data:
  minio_data:
